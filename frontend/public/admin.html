<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - AI Resume Intelligence</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h2>🤖 AI Resume Intelligence - Admin</h2>
            </div>
            <div class="nav-links">
                <span id="userName"></span>
                <button onclick="logout()" class="btn-secondary">Logout</button>
            </div>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('jobs')">Job Listings</button>
            <button class="tab-btn" onclick="showTab('applications')">Applications</button>
            <button class="tab-btn" onclick="showTab('create')">Create Job</button>
        </div>

        <!-- Jobs Tab -->
        <div id="jobsTab" class="tab-content active">
            <h2>Job Listings</h2>
            <div id="jobsList"></div>
        </div>

        <!-- Applications Tab -->
        <div id="applicationsTab" class="tab-content">
            <h2>All Applications</h2>
            <div id="applicationsList"></div>
        </div>

        <!-- Create Job Tab -->
        <div id="createTab" class="tab-content">
            <h2>Create New Job</h2>
            <form id="createJobForm" class="job-form">
                <div class="form-group">
                    <label for="title">Job Title *</label>
                    <input type="text" id="title" name="title" required>
                </div>
                <div class="form-group">
                    <label for="description">Job Description *</label>
                    <textarea id="description" name="description" rows="5" required></textarea>
                </div>
                <div class="form-group">
                    <label for="mandatory_skills">Mandatory Skills (comma-separated) *</label>
                    <input type="text" id="mandatory_skills" name="mandatory_skills" 
                           placeholder="e.g., Python, Machine Learning, TensorFlow" required>
                </div>
                <div class="form-group">
                    <label for="optional_skills">Optional Skills (comma-separated)</label>
                    <input type="text" id="optional_skills" name="optional_skills" 
                           placeholder="e.g., Docker, AWS, Kubernetes">
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="certification_enabled" name="certification_enabled">
                        Enable Certification Scoring
                    </label>
                </div>
                <div class="form-group" id="certWeightGroup" style="display: none;">
                    <label for="certification_weight">Certification Weight (0-1)</label>
                    <input type="number" id="certification_weight" name="certification_weight" 
                           min="0" max="1" step="0.1" value="0.2">
                </div>
                <div id="createJobError" class="error-message"></div>
                <button type="submit" class="btn-primary">Create Job</button>
            </form>
        </div>

        <!-- Edit Job Modal -->
        <div id="editModal" class="modal">
            <div class="modal-content">
                <span class="close" onclick="closeEditModal()">&times;</span>
                <h2>Edit Job</h2>
                <form id="editJobForm" class="job-form">
                    <input type="hidden" id="edit_job_id">
                    <div class="form-group">
                        <label for="edit_title">Job Title *</label>
                        <input type="text" id="edit_title" name="title" required>
                    </div>
                    <div class="form-group">
                        <label for="edit_description">Job Description *</label>
                        <textarea id="edit_description" name="description" rows="5" required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="edit_mandatory_skills">Mandatory Skills (comma-separated) *</label>
                        <input type="text" id="edit_mandatory_skills" name="mandatory_skills" required>
                    </div>
                    <div class="form-group">
                        <label for="edit_optional_skills">Optional Skills (comma-separated)</label>
                        <input type="text" id="edit_optional_skills" name="optional_skills">
                    </div>
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="edit_certification_enabled" name="certification_enabled">
                            Enable Certification Scoring
                        </label>
                    </div>
                    <div class="form-group">
                        <label for="edit_certification_weight">Certification Weight (0-1)</label>
                        <input type="number" id="edit_certification_weight" name="certification_weight" 
                               min="0" max="1" step="0.1" value="0.2">
                    </div>
                    <div id="editJobError" class="error-message"></div>
                    <button type="submit" class="btn-primary">Update Job</button>
                </form>
            </div>
        </div>
    </div>

    <script src="/js/admin.js"></script>
</body>
</html>
