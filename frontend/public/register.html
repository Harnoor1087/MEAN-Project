<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - AI Resume Intelligence</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h2><a href="/">🤖 AI Resume Intelligence</a></h2>
            </div>
            <div class="nav-links">
                <a href="/login">Login</a>
            </div>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <h2>Register</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="role">Register as</label>
                    <select id="role" name="role" required>
                        <option value="applicant">Job Applicant</option>
                        <option value="admin">Company/Admin</option>
                    </select>
                </div>
                <div class="form-group" id="companyGroup" style="display: none;">
                    <label for="company">Company Name</label>
                    <input type="text" id="company" name="company">
                </div>
                <div id="errorMessage" class="error-message"></div>
                <button type="submit" class="btn-primary btn-block">Register</button>
            </form>
            <p class="auth-footer">
                Already have an account? <a href="/login">Login here</a>
            </p>
        </div>
    </div>

    <script src="/js/auth.js"></script>
</body>
</html>
